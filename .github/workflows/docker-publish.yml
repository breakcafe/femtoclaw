# Publish Docker images to GitHub Container Registry (GHCR)
# - Push to main: builds release tags (latest, x.y.z, x.y.z-commit)
# - Manual dispatch: builds dev or release tags depending on branch
# - Supports RUNTIME build arg (node by default, bun via manual dispatch)

name: Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      runtime:
        description: 'JavaScript runtime'
        type: choice
        options: [node, bun]
        default: node

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/breakcafe/femtoclaw

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          VERSION=$(node -p "require('./package.json').version")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUNTIME=${{ inputs.runtime || 'node' }}

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "runtime=${RUNTIME}" >> "$GITHUB_OUTPUT"

          if [ "$RUNTIME" = "bun" ]; then
            SUFFIX="-bun"
          else
            SUFFIX=""
          fi

          if [ "${{ github.ref_name }}" = "main" ]; then
            TAGS="${GHCR_IMAGE}:latest${SUFFIX}"
            TAGS="${TAGS},${GHCR_IMAGE}:${VERSION}${SUFFIX}"
            TAGS="${TAGS},${GHCR_IMAGE}:${VERSION}-${COMMIT}${SUFFIX}"
          else
            SLUG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr 'A-Z' 'a-z')
            TAGS="${GHCR_IMAGE}:dev${SUFFIX}"
            TAGS="${TAGS},${GHCR_IMAGE}:dev-${COMMIT}${SUFFIX}"
            TAGS="${TAGS},${GHCR_IMAGE}:dev-${SLUG}${SUFFIX}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            RUNTIME=${{ steps.tags.outputs.runtime }}
            BUILD_VERSION=${{ steps.tags.outputs.version }}
            BUILD_COMMIT=${{ steps.tags.outputs.commit }}
            BUILD_TIME=${{ steps.tags.outputs.build_time }}
